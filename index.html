<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>과학관 예약 목록 (Compact)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f1f5f9; }
        .truncate-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="p-3 md:p-8">
    <div class="max-w-4xl mx-auto">
        <header class="mb-4">
            <h1 class="text-xl font-bold text-slate-900">🏛️ 예약 현황 리스트 <span id="total-count" class="text-sm font-normal text-slate-500 ml-2"></span></h1>
        </header>

        <div id="card-container" class="space-y-2 md:grid md:grid-cols-2 md:gap-3 md:space-y-0">
            </div>
    </div>

    <script>
        // 파일명이 파이썬에서 저장한 이름과 정확히 일치해야 합니다.
        const csvFile = 'science_reserve_list.csv';

        document.addEventListener('DOMContentLoaded', function() {
            Papa.parse(csvFile, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    renderList(results.data);
                },
                error: function() {
                    document.getElementById('card-container').innerHTML = "CSV 파일을 불러올 수 없습니다. 경로를 확인하세요.";
                }
            });
        });

        function renderList(data) {
            const container = document.getElementById('card-container');
            const countDisplay = document.getElementById('total-count');
            
            countDisplay.innerText = `총 ${data.length}건`;
            container.innerHTML = '';

            data.forEach(row => {
                const item = document.createElement('div');
                item.className = 'bg-white rounded-lg shadow-sm border border-slate-200 p-3 flex flex-col hover:border-blue-300 transition-all';
                
                // 데이터 맵핑 (파이썬 CSV 컬럼명과 동일해야 함)
                const title = row['제목'] || '제목 없음';
                const target = row['대상'] || '-';
                const cost = row['비용'] || '-';
                const eduDate = row['교육기간'] || '-'; // 누락되었던 부분 추가
                const regDate = row['신청기간'] || '-';
                const link = row['링크'] || '#';

                item.innerHTML = `
                    <div class="flex flex-col gap-1 mb-2">
                        <h2 class="text-sm font-bold text-slate-800 leading-snug truncate-2">${title}</h2>
                        <div class="grid grid-cols-2 gap-x-2 mt-1 text-[12px] text-slate-600">
                            <div><span class="text-slate-400 mr-1">대상:</span> ${target}</div>
                            <div><span class="text-slate-400 mr-1">비용:</span> <span class="font-semibold text-blue-600">${cost}</span></div>
                        </div>
                        <div class="text-[11px] text-slate-500 mt-1 space-y-0.5">
                            <div><span class="text-slate-400 mr-1">교육:</span> ${eduDate}</div>
                            <div><span class="text-slate-400 mr-1">신청:</span> <span class="text-orange-600">${regDate}</span></div>
                        </div>
                    </div>
                    <a href="${link}" target="_blank" class="block w-full bg-slate-100 hover:bg-slate-800 hover:text-white text-slate-700 text-[11px] font-bold py-1.5 rounded text-center transition-colors">
                        상세정보 보기
                    </a>
                `;
                container.appendChild(item);
            });
        }
    </script>
</body>
</html>
