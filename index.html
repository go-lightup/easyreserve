<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>과학관 교육 예약 알리미</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f1f5f9; }
        /* 모바일에서 텍스트가 넘치지 않게 말줄임표 처리 */
        .truncate-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="p-3 md:p-8">
    <div class="max-w-4xl mx-auto">
        <header class="mb-6 mt-4">
            <h1 class="text-2xl font-bold text-slate-900 flex items-center gap-2">
                🏛️ 교육 예약 현황
                <span id="total-count" class="text-xs font-normal text-slate-500 mt-1">총 0건</span>
            </h1>
        </header>

        <div id="card-container" class="space-y-2 md:grid md:grid-cols-2 md:gap-4 md:space-y-0">
            <div class="text-center py-20 text-slate-400 col-span-full">데이터를 읽어오고 있습니다...</div>
        </div>
    </div>

    <script>
        const csvFile = 'science_reserve_list.csv';

        document.addEventListener('DOMContentLoaded', function() {
            Papa.parse(csvFile, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    renderList(results.data);
                }
            });
        });

        function renderList(data) {
            const container = document.getElementById('card-container');
            const countDisplay = document.getElementById('total-count');
            
            if (!data || data.length === 0) {
                container.innerHTML = `<div class="text-center py-10">데이터가 없습니다.</div>`;
                return;
            }

            countDisplay.innerText = `총 ${data.length}건`;
            container.innerHTML = '';

            data.forEach(row => {
                const item = document.createElement('div');
                // 모바일에서 높이를 최소화한 디자인
                item.className = 'bg-white rounded-lg shadow-sm border border-slate-200 p-3 flex flex-col justify-between hover:border-blue-300 transition-colors';
                
                const title = row['제목'] || '제목 없음';
                const target = row['대상'] || '-';
                const cost = row['비용'] || '-';
                const regDate = row['신청기간'] || '-';
                const link = row['링크'] || '#';

                item.innerHTML = `
                    <div class="flex flex-col gap-1">
                        <div class="flex justify-between items-start gap-2">
                            <h2 class="text-base font-bold text-slate-800 leading-snug truncate-2 flex-1">${title}</h2>
                            <span class="shrink-0 text-[10px] font-bold bg-blue-50 text-blue-600 px-1.5 py-0.5 rounded border border-blue-100">접수중</span>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-x-4 gap-y-1 mt-1 text-[13px]">
                            <div class="flex items-center text-slate-500">
                                <span class="w-10 shrink-0 text-slate-400 text-[11px]">대상</span>
                                <span class="truncate text-slate-700">${target}</span>
                            </div>
                            <div class="flex items-center text-slate-500">
                                <span class="w-10 shrink-0 text-slate-400 text-[11px]">비용</span>
                                <span class="font-semibold text-blue-600">${cost}</span>
                            </div>
                            <div class="flex items-center text-slate-500 col-span-2 border-t border-slate-50 pt-1 mt-1">
                                <span class="w-12 shrink-0 text-slate-400 text-[11px]">신청일</span>
                                <span class="text-orange-600 font-medium truncate">${regDate}</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="mt-3 flex gap-2">
                        <a href="${link}" target="_blank" class="flex-1 bg-slate-800 text-white text-xs font-semibold py-2 rounded text-center active:bg-slate-700">
                            상세보기 및 신청
                        </a>
                    </div>
                `;
                container.appendChild(item);
            });
        }
    </script>
</body>
</html>
