<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>과학관 예약 목록 (상태 반영)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f1f5f9; }
        .truncate-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        /* 접수종료 항목을 위한 희미한 효과 */
        .status-expired { opacity: 0.6; filter: grayscale(0.5); }
    </style>
</head>
<body class="p-3 md:p-8">
    <div class="max-w-4xl mx-auto">
        <header class="mb-4">
            <h1 class="text-xl font-bold text-slate-900">🏛️ 예약 현황 리스트 <span id="total-count" class="text-sm font-normal text-slate-500 ml-2"></span></h1>
        </header>

        <div id="card-container" class="space-y-2 md:grid md:grid-cols-2 md:gap-3 md:space-y-0">
            </div>
    </div>

    <script>
        const csvFile = 'science_reserve_list.csv';

        document.addEventListener('DOMContentLoaded', function() {
            Papa.parse(csvFile, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    renderList(results.data);
                }
            });
        });

        function renderList(data) {
            const container = document.getElementById('card-container');
            const countDisplay = document.getElementById('total-count');
            
            countDisplay.innerText = `총 ${data.length}건`;
            container.innerHTML = '';

            data.forEach(row => {
                const item = document.createElement('div');
                
                // CSV에서 '상태' 읽기
                const statusText = row['상태'] || '확인불가';
                const isExpired = statusText === '접수종료';
                const isWaiting = statusText === '대기중';

                // 상태별 뱃지 디자인 설정
                let statusClass = 'bg-blue-50 text-blue-600 border-blue-100'; // 진행중 (기본)
                if (isExpired) statusClass = 'bg-slate-100 text-slate-500 border-slate-200';
                if (isWaiting) statusClass = 'bg-orange-50 text-orange-600 border-orange-100';

                // 전체 아이템 스타일 (종료 시 흐릿하게)
                item.className = `bg-white rounded-lg shadow-sm border p-3 flex flex-col transition-all ${isExpired ? 'status-expired border-slate-200' : 'hover:border-blue-300 border-slate-200'}`;
                
                const title = row['제목'] || '제목 없음';
                const target = row['대상'] || '-';
                const cost = row['비용'] || '-';
                const eduDate = row['교육기간'] || '-';
                const regDate = row['신청기간'] || '-';
                const link = row['링크'] || '#';

                // 텍스트 색상 결정 (종료 시 희미한 회색)
                const textMainClass = isExpired ? 'text-slate-400' : 'text-slate-800';
                const textSubClass = isExpired ? 'text-slate-400' : 'text-slate-600';
                const accentColor = isExpired ? 'text-slate-400' : 'text-blue-600';

                item.innerHTML = `
                    <div class="flex flex-col gap-1 mb-2">
                        <div class="flex justify-between items-start gap-2 mb-1">
                            <h2 class="text-sm font-bold leading-snug truncate-2 flex-1 ${textMainClass}">${title}</h2>
                            <span class="shrink-0 text-[10px] font-bold px-1.5 py-0.5 rounded border ${statusClass}">${statusText}</span>
                        </div>
                        <div class="grid grid-cols-2 gap-x-2 mt-1 text-[12px] ${textSubClass}">
                            <div><span class="text-slate-300 mr-1">대상:</span> ${target}</div>
                            <div><span class="text-slate-300 mr-1">비용:</span> <span class="font-semibold ${accentColor}">${cost}</span></div>
                        </div>
                        <div class="text-[11px] mt-1 space-y-0.5 ${textSubClass}">
                            <div><span class="text-slate-300 mr-1">교육:</span> ${eduDate}</div>
                            <div><span class="text-slate-300 mr-1">신청:</span> ${regDate}</div>
                        </div>
                    </div>
                    <a href="${link}" target="_blank" class="block w-full ${isExpired ? 'bg-slate-100 text-slate-400 cursor-not-allowed' : 'bg-slate-800 text-white hover:bg-slate-900'} text-[11px] font-bold py-1.5 rounded text-center transition-colors">
                        ${isExpired ? '접수종료된 프로그램' : '상세정보 및 신청'}
                    </a>
                `;
                container.appendChild(item);
            });
        }
    </script>
</body>
</html>
